
<style>
  .player-wrap { padding: 1.5rem 0; max-width: 680px; }
  .drop-zone {
    border: 1.5px dashed var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
    background: var(--color-background-secondary);
  }
  .drop-zone:hover { background: var(--color-background-tertiary); }
  .drop-zone.hidden { display: none; }
  .video-container { display: none; flex-direction: column; gap: 12px; }
  .video-container.visible { display: flex; }
  video {
    width: 100%;
    border-radius: var(--border-radius-lg);
    background: #000;
    max-height: 360px;
    outline: none;
  }
  .progress-bar-wrap {
    width: 100%;
    height: 4px;
    background: var(--color-border-tertiary);
    border-radius: 99px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--color-text-primary);
    border-radius: 99px;
    width: 0%;
    transition: width 0.1s linear;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ctrl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 0 16px;
    height: 38px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s, transform 0.08s;
  }
  .ctrl-btn:hover { background: var(--color-background-secondary); }
  .ctrl-btn:active { transform: scale(0.97); }
  .ctrl-btn.play-pause {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: transparent;
    min-width: 90px;
  }
  .ctrl-btn.play-pause:hover { opacity: 0.85; }
  .time-display {
    margin-left: auto;
    font-size: 12px;
    color: var(--color-text-secondary);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .file-name {
    font-size: 13px;
    color: var(--color-text-secondary);
    padding: 0 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  input[type="file"] { display: none; }
</style>

<div class="player-wrap">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">MP4 비디오 플레이어</h2>

  <div class="drop-zone" id="dropZone">
    <i class="ti ti-file-type-mp4" style="font-size:40px; color:var(--color-text-secondary); display:block; margin-bottom:12px;" aria-hidden="true"></i>
    <p style="font-size:15px; font-weight:500; color:var(--color-text-primary); margin:0 0 6px;">MP4 파일을 여기에 드래그하거나</p>
    <p style="font-size:13px; color:var(--color-text-secondary); margin:0 0 16px;">클릭하여 파일을 선택하세요</p>
    <button class="ctrl-btn" onclick="document.getElementById('fileInput').click()">
      <i class="ti ti-upload" style="font-size:16px;" aria-hidden="true"></i> 파일 선택
    </button>
    <input type="file" id="fileInput" accept="video/mp4,video/*">
  </div>

  <div class="video-container" id="videoContainer">
    <p class="file-name" id="fileName"></p>
    <video id="videoEl" preload="metadata"></video>
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn play-pause" id="playPauseBtn" aria-label="재생">
        <i class="ti ti-player-play" id="playIcon" style="font-size:16px;" aria-hidden="true"></i>
        <span id="playLabel">재생</span>
      </button>
      <button class="ctrl-btn" onclick="seek(-10)" aria-label="10초 뒤로">
        <i class="ti ti-player-track-prev" style="font-size:15px;" aria-hidden="true"></i> -10초
      </button>
      <button class="ctrl-btn" onclick="seek(10)" aria-label="10초 앞으로">
        +10초 <i class="ti ti-player-track-next" style="font-size:15px;" aria-hidden="true"></i>
      </button>
      <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
    </div>
  </div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const videoContainer = document.getElementById('videoContainer');
  const videoEl = document.getElementById('videoEl');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const playIcon = document.getElementById('playIcon');
  const playLabel = document.getElementById('playLabel');
  const progressFill = document.getElementById('progressFill');
  const progressWrap = document.getElementById('progressWrap');
  const timeDisplay = document.getElementById('timeDisplay');
  const fileName = document.getElementById('fileName');

  function loadFile(file) {
    if (!file || !file.type.startsWith('video/')) return;
    const url = URL.createObjectURL(file);
    videoEl.src = url;
    fileName.textContent = file.name;
    dropZone.classList.add('hidden');
    videoContainer.classList.add('visible');
    setPlayState(false);
  }

  fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.style.background = 'var(--color-background-tertiary)';
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.style.background = '';
  });
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.background = '';
    loadFile(e.dataTransfer.files[0]);
  });

  function setPlayState(playing) {
    if (playing) {
      playIcon.className = 'ti ti-player-pause';
      playLabel.textContent = '일시정지';
    } else {
      playIcon.className = 'ti ti-player-play';
      playLabel.textContent = '재생';
    }
  }

  playPauseBtn.addEventListener('click', () => {
    if (videoEl.paused) {
      videoEl.play();
      setPlayState(true);
    } else {
      videoEl.pause();
      setPlayState(false);
    }
  });

  videoEl.addEventListener('ended', () => setPlayState(false));

  function seek(delta) {
    videoEl.currentTime = Math.max(0, Math.min(videoEl.duration || 0, videoEl.currentTime + delta));
  }

  function fmt(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }

  videoEl.addEventListener('timeupdate', () => {
    const pct = videoEl.duration ? (videoEl.currentTime / videoEl.duration) * 100 : 0;
    progressFill.style.width = pct.toFixed(2) + '%';
    timeDisplay.textContent = fmt(videoEl.currentTime) + ' / ' + fmt(videoEl.duration);
  });

  progressWrap.addEventListener('click', e => {
    const rect = progressWrap.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    if (videoEl.duration) videoEl.currentTime = ratio * videoEl.duration;
  });
</script>
